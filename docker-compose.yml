services:
  backend:
    build:
      context: ./back-cip
    container_name: cip_backend
    command: >
      bash -c "python manage.py migrate && 
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./back-cip:/app
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./front-cip
    container_name: cip_frontend
    command: npm run dev -- --host
    volumes:
      - ./front-cip:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
