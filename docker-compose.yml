services:
  db:
    image: postgres:15
    container_name: cip_db
    environment:
      POSTGRES_DB: cip_db
      POSTGRES_USER: cip_user
      POSTGRES_PASSWORD: cip_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./back-cip
    container_name: cip_backend
    command: >
      bash -c "python manage.py migrate && 
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./back-cip:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://cip_user:cip_password@db:5432/cip_db

  frontend:
    build:
      context: ./front-cip
    container_name: cip_frontend
    command: npm run dev -- --host
    volumes:
      - ./front-cip:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
